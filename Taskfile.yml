version: "3"

tasks:
  update-core:
    desc: Get the latest version of the core
    cmds:
      - go get github.com/skel-tech/mdpress-core@latest

  build:
    desc: Build binary to bin/mdpress
    deps:
      - update-core
    cmds:
      - go build -o bin/mdpress .

  build-darwin-amd64:
    desc: Build for darwin/amd64
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o bin/mdpress-darwin-amd64 .

  build-darwin-arm64:
    desc: Build for darwin/arm64
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -o bin/mdpress-darwin-arm64 .

  build-linux-amd64:
    desc: Build for linux/amd64
    cmds:
      - GOOS=linux GOARCH=amd64 go build -o bin/mdpress-linux-amd64 .

  release:
    desc: Cross-compile for all platforms
    deps:
      - build-darwin-amd64
      - build-darwin-arm64
      - build-linux-amd64

  install:
    desc: Install to $GOPATH/bin
    cmds:
      - go install .

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run linter
    cmds:
      - go vet ./...

  coverage:
    desc: Generate HTML coverage report
    cmds:
      - go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out
